spring.application.name=BE-learn-english

spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:postgres}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public
spring.flyway.default-schema=public
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.repair-on-migrate=true

jwt.secret=${JWT_SECRET:dev-secret-key-must-be-at-least-32-bytes-long!!}
jwt.access-token-expiration=900
jwt.refresh-token-expiration=604800

allowed.origin=${ALLOWED_ORIGIN:http://localhost:3000}

google.oauth.client-id=${GOOGLE_CLIENT_ID:}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET:}
google.oauth.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/callback/google}

frontend.url=${FRONTEND_URL:http://localhost:3000}

# YouTube API Configuration
youtube.api.key=${YOUTUBE_API_KEY:AIzaSyBxTEqX5HoPywra4PG1_ob-vNSANPeChAA}
youtube.api.timeout-seconds=${YOUTUBE_API_TIMEOUT_SECONDS:15}
youtube.api.max-retries=${YOUTUBE_API_MAX_RETRIES:2}
youtube.cache.channel-ttl-minutes=${YOUTUBE_CACHE_TTL_MINUTES:60}
youtube.cache.max-size=${YOUTUBE_CACHE_MAX_SIZE:1000}
youtube.downloader.max-retries=${YOUTUBE_DOWNLOADER_MAX_RETRIES:1}

# Hibernate SQL logging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.com.example.belearnenglish=DEBUG


# Python Script Configuration
python.command=${PYTHON_COMMAND:python}
python.script.path=${PYTHON_SCRIPT_PATH:scripts/download_transcript.py}
python.script.timeout=${PYTHON_SCRIPT_TIMEOUT:30}
